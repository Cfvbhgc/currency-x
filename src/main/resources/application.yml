server:
  port: 8080

spring:
  application:
    name: currency-x
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000
  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

grpc:
  server:
    port: 9090
    enable-keep-alive: true
    keep-alive-time: 30s
    keep-alive-timeout: 10s

logging:
  level:
    com.currencyx: DEBUG
    net.devh.boot.grpc: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

currency:
  cache:
    rate-ttl-seconds: 300
    history-ttl-seconds: 3600
  mock-bank:
    fluctuation-percent: 0.5
